<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nova Tech | V13</title>
    <link rel="icon" type="image/png" href="icon.png">
    
    <script src="coi-serviceworker.js"></script>
    
    <style>
        :root { 
            --liquid-glass: rgba(255, 255, 255, 0.08); 
            --border-glow: rgba(255, 255, 255, 0.15); 
            --accent: #00a2ff;
            --warning: #ffae00;
        }
        
        body, html { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: 'Segoe UI', sans-serif; 
            color: white; 
        }

        /* Viewport Logic */
        #viewport { 
            display: flex; 
            width: 300vw; 
            height: 100vh; 
            transition: transform 0.8s cubic-bezier(0.85, 0, 0.15, 1); 
        }

        .screen { 
            width: 100vw; 
            height: 100vh; 
            background-size: cover; 
            background-position: center; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
        }

        /* Screen-Specific Backgrounds */
        #main-screen { background-image: url('phone.png'); }
        #games-screen { background-color: #050505; background-image: url('games.png'); }
        #comms-screen { background-image: url('comms.png'); }

        /* Android Asset Scaling */
        @media (max-width: 1024px) {
            #main-screen { background-image: url('phoneandroid.png') !important; }
            #games-screen { background-image: url('gamesandroid.png') !important; }
            #comms-screen { background-image: url('commsandroid.png') !important; }
        }

        /* Navigation HUD */
        nav {
            position: fixed; 
            top: 20px; 
            left: 50%; 
            transform: translateX(-50%);
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 12px 25px;
            border-radius: 15px; 
            background: rgba(0, 0, 0, 0.7); 
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-glow); 
            z-index: 1000; 
            transition: all 0.6s ease-in-out;
        }

        .nav-side-mode { 
            left: 30px; 
            transform: translateX(0); 
            align-items: flex-start; 
        }

        .nav-buttons { display: flex; gap: 8px; }
        
        button { 
            background: #111; 
            border: 1px solid #333; 
            color: #888; 
            padding: 8px 15px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 11px; 
            transition: 0.3s; 
        }

        button.active { 
            background: var(--accent); 
            color: #fff; 
            border-color: var(--accent); 
            box-shadow: 0 0 15px rgba(0,162,255,0.4); 
        }

        /* Interaction Bars */
        .controls-bar {
            margin-bottom: 15px; 
            display: flex; 
            gap: 10px; 
            align-items: center; 
            flex-wrap: wrap; 
            justify-content: center;
            padding: 15px; 
            border-radius: 12px; 
            background: var(--liquid-glass); 
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glow); 
            z-index: 10;
        }

        select, .action-btn { 
            background: rgba(0,0,0,0.8); 
            color: white; 
            border: 1px solid #444; 
            padding: 8px 12px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 12px; 
        }

        .action-btn:hover { background: #fff; color: #000; }

        /* The Engine Housing */
        #emu-container { 
            width: 90%; 
            max-width: 900px; 
            height: 500px; 
            background: #000; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #333; 
            position: relative;
        }

        iframe { width: 100%; height: 100%; border: none; }

        #status-bar { 
            width: 100%; 
            background: #000; 
            color: #0f0; 
            font-family: monospace; 
            font-size: 11px; 
            padding: 8px 15px; 
            border-top: 1px solid #222; 
            transition: color 0.5s; 
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<nav id="mainNav">
    <h1 style="margin:0 0 5px 0; font-size:0.5rem; letter-spacing:5px; color: var(--accent);">NOVA TECH | V13</h1>
    <div class="nav-buttons">
        <button onclick="slideTo('main', 0)" id="btn-0" class="active">HOME</button>
        <button onclick="slideTo('games', 1)" id="btn-1">SONIC</button>
        <button onclick="slideTo('comms', 2)" id="btn-2">COMMS</button>
    </div>
</nav>

<div id="viewport">
    
    <div id="main-screen" class="screen">
        </div>

    <div id="games-screen" class="screen"> 
        <div class="controls-bar">
            <select id="engineType" onchange="updateEngineList()">
                <option value="rsdkv5">RSDK v5 (Mania)</option>
                <option value="rsdkv3">RSDK v3 (Sonic CD)</option>
                <option value="retroarch">RetroArch (S1/S2)</option>
            </select>
            
            <select id="gameSelect"></select>
            
            <button class="action-btn" onclick="bootEngine()" style="background: var(--accent);">INITIALIZE</button>
        </div>

        <div id="emu-container">
            <div id="iframe-target" style="width:100%; height:calc(100% - 27px);">
                <div style="display:flex; align-items:center; justify-content:center; height:100%; color:#151515; font-weight:bold;">SONIC ENGINE STANDBY</div>
            </div>
            <div id="status-bar">> KERNEL READY. SELECT MODULE TO INJECT.</div>
        </div>
    </div>

    <div id="comms-screen" class="screen">
        <h2 style="letter-spacing: 5px; text-transform: uppercase; font-size: 0.8rem; margin-bottom: 20px;">Secure Comms Channel</h2>
        <div class="controls-bar" style="width: 90%; max-width: 500px;">
            <input type="text" id="msg" style="flex-grow:1; background:none; border:none; color:white; outline:none; font-family: monospace;" placeholder="Enter transmission...">
            <button onclick="sendMessage()" class="action-btn">SEND</button>
        </div>
    </div>

</div>

<script>
    const engineConfig = {
        rsdkv5: [{ name: "Sonic Mania", file: "Mania/index.html" }],
        rsdkv3: [{ name: "Sonic CD", file: "CD/index.html" }],
        retroarch: [
            { name: "Sonic 1", file: "sonic1.zip" },
            { name: "Sonic 2", file: "sonic2.zip" }
        ]
    };

    function updateEngineList() {
        const type = document.getElementById('engineType').value;
        const selector = document.getElementById('gameSelect');
        selector.innerHTML = '';
        
        engineConfig[type].forEach(game => {
            let opt = document.createElement('option');
            opt.value = game.file;
            opt.innerHTML = game.name;
            selector.appendChild(opt);
        });
    }

    function bootEngine() {
        const type = document.getElementById('engineType').value;
        const file = document.getElementById('gameSelect').value;
        const target = document.getElementById('iframe-target');
        const status = document.getElementById('status-bar');

        const confirmBoot = confirm("SYSTEM WARNING: Large file load detected (~400MB). It may take up to 30 seconds to start. Please wait patiently.");

        if (confirmBoot) {
            status.innerText = "> BOOTING MODULE... STANDBY FOR 30s.";
            status.style.color = "var(--warning)";
            target.innerHTML = `<iframe src="${file}"></iframe>`;
            
            setTimeout(() => {
                status.innerText = "> ENGINE STABILIZED. ENJOY THE GAME.";
                status.style.color = "#0f0";
            }, 30000);
        } else {
            status.innerText = "> LOAD ABORTED.";
        }
    }

    function slideTo(name, index) {
        const vp = document.getElementById('viewport');
        const nav = document.getElementById('mainNav');
        
        vp.style.transform = `translateX(-${index * 100}vw)`;
        
        if (index > 0) {
            nav.classList.add('nav-side-mode');
        } else {
            nav.classList.remove('nav-side-mode');
        }

        document.querySelectorAll('.nav-buttons button').forEach((btn, i) => {
            btn.className = (i === index) ? 'active' : '';
        });
    }

    function sendMessage() {
        const input = document.getElementById("msg");
        const message = input.value.trim();
        if (!message) return;

        fetch("https://discord.com/api/webhooks/1492850737103765505/jV5m5oiaZjVpx95d_w3hhNOm09F-e113L4l61lSVBemtIETbQiFAm2wwabb33fIXf9Sw", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ content: message })
        })
        .then(res => {
            if (res.ok) { 
                input.value = ""; 
                alert("Transmission Sent."); 
            }
        });
    }

    // Initial setup
    updateEngineList();
</script>

</body>
</html>
